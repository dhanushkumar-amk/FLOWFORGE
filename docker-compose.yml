services:
  mongo:
    image: mongo:7
    container_name: flowforge-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: flowforge
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: flowforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    container_name: flowforge-api
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    working_dir: /workspace
    command: pnpm --filter @flowforge/api dev
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/flowforge
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    volumes:
      - .:/workspace
      - api-node-modules:/workspace/node_modules
    develop:
      watch:
        - action: sync
          path: .
          target: /workspace
          ignore:
            - node_modules/
            - dist/

volumes:
  mongo-data:
  redis-data:
  api-node-modules:
